<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body>
        <div th:replace="fragments/navbar :: navbar"></div>

        <div class="container mt-4">
            <h1>*Insert Exercise Name* history</h1>
        </div>

        <div class="exercise-history-feed">

<!--            each exercise-->
            <div th:each="ex : ${exercises}" class="exercise">

                <div class="exercise-header">
                    <div>placeholder</div>
<!--                    <span th:text="${#temporals.format(workout.startedAt, 'yyyy-MM-dd')}" class="workout-date"></span>-->
                </div>

                <strong>Sets:</strong>

                <ul>
<!--                    show all sets in the exercise record eg set1 - 20kg x 12 -->
                    <li th:each="set : ${sets}">
                        <span th:text="${set.setNumber}"></span>
                        <span th:text="${set.weightKg}"></span>
                        <span th:text="${set.reps}"></span>
                    </li>
                </ul>

            </div>

        </div>

    </body>
</html>
